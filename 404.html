<meta charset="UTF-8">

<title>404 – Az oldal nem található | TudatosAI</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--teal:#46A0A0;--blue:#2F6482;--bg-page:#F8FAFB;--bg-card:#FFFFFF;--text:#1E2E38;--text-muted:#6B8290;--border:#DDE7EC;}
[data-theme="dark"]{--bg-page:#1F2F3D;--bg-card:#283D4E;--text:#F0F5F8;--text-muted:#96B5C6;--border:#446070;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-page);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transition:background .3s,color .3s;}
.error-code{font-family:'DM Serif Display',serif;font-size:clamp(5rem,15vw,10rem);line-height:1;color:var(--teal);opacity:.3;margin-bottom:1rem;}
h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);margin-bottom:.8rem;}
p{color:var(--text-muted);font-size:1rem;max-width:400px;line-height:1.7;margin-bottom:2rem;font-weight:300;}
.links{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.links a{padding:.75rem 1.8rem;border-radius:8px;font-weight:600;font-size:.9rem;transition:background .2s,transform .15s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--blue);transform:translateY(-2px);}
.btn-secondary{background:transparent;color:var(--teal);border:1.5px solid var(--teal);}
.btn-secondary:hover{background:var(--teal);color:#fff;transform:translateY(-2px);}
a{text-decoration:none;}
</style>
</head>
<body>
<div class="error-code">404</div>
<h1>Az oldal nem található</h1>
<p>A keresett oldal nem létezik, vagy áthelyezésre került. De ne aggódj — segítünk visszatalálni!</p>
<div class="links">
  <a href="/" class="btn-primary">Kezdőlap</a>
  <a href="/blog/" class="btn-secondary">Blog</a>
</div>

</script>
